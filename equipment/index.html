<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Equipment - GLV 402</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Pacifico&display=swap" rel="stylesheet">
<style>
  :root{--accent:#38bdf8;--accent-strong:#0ea5e9;--accent-light:#e0f2fe;--cream:#f0f9ff;--text-dark:#1f2937;--text-mid:#475569;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Nunito',sans-serif;background:var(--cream);color:var(--text-dark);min-height:100vh}
  .lang-bar{display:flex;justify-content:center;gap:6px;padding:10px 16px;flex-wrap:wrap;background:var(--cream)}
  .lang-btn{border:2px solid var(--accent-light);background:rgba(255,255,255,.92);border-radius:999px;padding:4px 9px;font-family:'Nunito',sans-serif;font-size:.72rem;font-weight:800;color:var(--text-mid);cursor:pointer;transition:all .2s;box-shadow:0 2px 8px rgba(60,80,120,.12)}
  .lang-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .lang-btn:hover:not(.active){border-color:var(--accent);color:var(--accent)}
  .top-bar{background:linear-gradient(135deg,var(--accent) 0%,var(--accent-strong) 100%);padding:16px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:10;box-shadow:0 2px 12px rgba(14,165,233,.28)}
  .back-btn{background:rgba(255,255,255,.25);border:none;border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.2rem;color:#fff;text-decoration:none;flex-shrink:0;transition:background .2s}
  .back-btn:hover{background:rgba(255,255,255,.4)}
  .top-emoji{font-size:1.8rem}
  .top-title{font-family:'Pacifico',cursive;font-size:1.3rem;color:#fff;text-shadow:1px 2px 4px rgba(0,0,0,.2);flex:1}
  .content{padding:20px 16px 40px;max-width:680px;margin:0 auto}
  .section-title{font-family:'Pacifico',cursive;font-size:1rem;color:var(--accent);margin:20px 0 8px}
  .page-img{width:100%;border-radius:12px;margin:12px 0;box-shadow:0 2px 12px rgba(60,80,120,.12)}
  .info-card{background:#fff;border-left:4px solid var(--accent);border-radius:12px;padding:16px 18px;margin:0 0 18px;box-shadow:0 2px 10px rgba(60,80,120,.10)}
  .info-card p{font-size:.92rem;line-height:1.75;color:var(--text-mid);margin:0}
  .back-footer{text-align:center;margin-top:28px;padding-bottom:20px}
  .back-footer a{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#fff;text-decoration:none;padding:12px 28px;border-radius:999px;font-weight:800;font-size:.9rem;transition:opacity .2s}
  .back-footer a:hover{opacity:.8}
</style>
  <link rel="stylesheet" href="../assets/cute-pack.css">
</head>
<body>
<div class="lang-bar">
  <button class="lang-btn active" onclick="setLang('en',this)">&#x1F1EC;&#x1F1E7; EN</button>
  <button class="lang-btn" onclick="setLang('ja',this)">&#x1F1EF;&#x1F1F5; JA</button>
  <button class="lang-btn" onclick="setLang('zh',this)">&#x1F1E8;&#x1F1F3; ZH</button>
  <button class="lang-btn" onclick="setLang('ko',this)">&#x1F1F0;&#x1F1F7; KO</button>
  <button class="lang-btn" onclick="setLang('fr',this)">&#x1F1EB;&#x1F1F7; FR</button>
  <button class="lang-btn" onclick="setLang('es',this)">&#x1F1EA;&#x1F1F8; ES</button>
</div>
<div class="top-bar">
  <a href="../" class="back-btn">&#x2190;</a>
  <span class="top-emoji">🏠</span>
  <div class="top-title">Equipment</div>
</div>
<div class="content">
  <div class="section-title" data-i18n="s1"></div>
  <img src="../assets/guide/equipment-ac.png" class="page-img" alt="Air conditioner guide">
  <div class="info-card"><p data-i18n="eq1"></p></div>

  <div class="section-title" data-i18n="s2"></div>
  <img src="../assets/guide/equipment-tv.png" class="page-img" alt="TV guide">
  <div class="info-card"><p data-i18n="eq2"></p></div>

  <div class="section-title" data-i18n="s3"></div>
  <img src="../assets/guide/equipment-bidet.png" class="page-img" alt="Bidet guide">
  <div class="info-card"><p data-i18n="eq3"></p></div>

  <div class="section-title" data-i18n="s4"></div>
  <img src="../assets/guide/equipment-water-heater.png" class="page-img" alt="Water heater guide">
  <div class="info-card"><p data-i18n="eq4"></p></div>

  <div class="section-title" data-i18n="s5"></div>
  <img src="../assets/guide/equipment-microwave.png" class="page-img" alt="Microwave guide">
  <div class="info-card"><p data-i18n="eq5"></p></div>

  <div class="section-title" data-i18n="s6"></div>
  <img src="../assets/guide/equipment-toaster.png" class="page-img" alt="Toaster oven guide">
  <div class="info-card"><p data-i18n="eq6"></p></div>

  <div class="back-footer">
    <a href="../" data-i18n="backToMenu">&#x2190; Back to Menu</a>
  </div>
</div>
<script>
const S = {
  en: {

    eq5: "Set the power level with the upper dial, then set the cooking time with the lower dial.",
    eq6: "Place the food inside and turn the timer dial. The toaster oven starts automatically."
  },
  ja: {

    s3: "ウォシュレット",

    s1: "空调",
    s2: "电视",
    s3: "智能马桶",
    s4: "热水器",
    s5: "微波炉",
    s6: "烤箱",
    eq1: "按 COOL 或 HEAT 启动空调。温度和风量请按图片中的按钮调节。",
    eq2: "按 ON/OFF 开机，按 HOME MENU 打开智能电视界面。",
    eq3: "可按需使用前洗或后洗按钮，结束时请按 STOP。",

    eq6: "放入食物后旋转定时旋钮，烤箱会自动开始工作。"
  },
  ko: {
    backToMenu: "← 메뉴로 돌아가기",
    s1: "에어컨",
    s2: "TV",
    s3: "비데",
    s4: "온수기",
    s5: "전자레인지",
    s6: "토스터 오븐",
    eq1: "COOL 또는 HEAT 버튼으로 에어컨을 켜고, 온도와 풍량은 이미지의 버튼으로 조절하세요.",
    eq2: "ON/OFF 로 전원을 켜고 HOME MENU 로 스마트 TV 화면을 여세요.",
    eq3: "필요에 따라 앞/뒤 세정 버튼을 사용하고 종료할 때는 STOP 을 누르세요.",
    eq4: "온수를 사용하기 전에 ON/OFF 를 누르고 위아래 버튼으로 온도를 조절하세요.",
    eq5: "위 다이얼로 출력 단계를 고르고 아래 다이얼로 시간을 설정하세요.",
    eq6: "음식을 넣고 타이머 다이얼을 돌리면 자동으로 작동합니다."
  },
  fr: {
    backToMenu: "← Retour au menu",
    s1: "Climatiseur",
    s2: "Télévision",
    s3: "Bidet",
    s4: "Chauffe-eau",
    s5: "Micro-ondes",
    s6: "Four grille-pain",
    eq1: "Appuyez sur COOL ou HEAT pour démarrer la climatisation. Réglez la température et la ventilation avec les boutons indiqués.",
    eq2: "Utilisez ON/OFF pour allumer la TV et HOME MENU pour ouvrir l'écran Smart TV.",
    eq3: "Utilisez le lavage avant ou arrière si besoin, puis appuyez sur STOP pour terminer.",
    eq4: "Avant d'utiliser l'eau chaude, appuyez sur ON/OFF puis réglez la température avec les boutons haut et bas.",
    eq5: "Réglez la puissance avec la molette du haut puis le temps avec la molette du bas.",
    eq6: "Placez les aliments dans le four puis tournez la minuterie. Le four démarre automatiquement."
  },
  es: {
    backToMenu: "← Volver al menú",
    s1: "Aire acondicionado",
    s2: "Televisión",
    s3: "Bidé",
    s4: "Calentador de agua",
    s5: "Microondas",
    s6: "Horno tostador",
    eq1: "Pulse COOL o HEAT para encender el aire acondicionado. Ajuste la temperatura y el caudal de aire con los botones de la imagen.",
    eq2: "Use ON/OFF para encender la TV y HOME MENU para abrir la pantalla Smart TV.",
    eq3: "Use los botones de lavado delantero o trasero según sea necesario y pulse STOP para terminar.",
    eq4: "Antes de usar agua caliente, pulse ON/OFF y ajuste la temperatura con los botones superior e inferior.",
    eq5: "Use el dial superior para elegir la potencia y el inferior para fijar el tiempo.",
    eq6: "Coloque la comida dentro y gire el temporizador. El horno se iniciará automáticamente."
  }
};

function setLang(lang, btn) {
  document.querySelectorAll(".lang-btn").forEach((b) => b.classList.remove("active"));
  btn.classList.add("active");
  const dict = S[lang];
  if (!dict) return;
  document.querySelectorAll("[data-i18n]").forEach((el) => {
    const key = el.getAttribute("data-i18n");
    if (key in dict) el.textContent = dict[key];
  });
}

setLang("en", document.querySelector(".lang-btn.active"));
</script>
  <script src="../assets/cute-pack.js" defer></script>
</body>
</html>
