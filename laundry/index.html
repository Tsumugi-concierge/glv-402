<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laundry - GLV 402</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Pacifico&display=swap" rel="stylesheet">
<style>
  :root{--accent:#38bdf8;--accent-strong:#0ea5e9;--accent-light:#e0f2fe;--cream:#f0f9ff;--text-dark:#1f2937;--text-mid:#475569;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Nunito',sans-serif;background:var(--cream);color:var(--text-dark);min-height:100vh}
  .lang-bar{display:flex;justify-content:center;gap:6px;padding:10px 16px;flex-wrap:wrap;background:var(--cream)}
  .lang-btn{border:2px solid var(--accent-light);background:rgba(255,255,255,.92);border-radius:999px;padding:4px 9px;font-family:'Nunito',sans-serif;font-size:.72rem;font-weight:800;color:var(--text-mid);cursor:pointer;transition:all .2s;box-shadow:0 2px 8px rgba(60,80,120,.12)}
  .lang-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .lang-btn:hover:not(.active){border-color:var(--accent);color:var(--accent)}
  .top-bar{background:linear-gradient(135deg,var(--accent) 0%,var(--accent-strong) 100%);padding:16px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:10;box-shadow:0 2px 12px rgba(14,165,233,.28)}
  .back-btn{background:rgba(255,255,255,.25);border:none;border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.2rem;color:#fff;text-decoration:none;flex-shrink:0;transition:background .2s}
  .back-btn:hover{background:rgba(255,255,255,.4)}
  .top-emoji{font-size:1.8rem}
  .top-title{font-family:'Pacifico',cursive;font-size:1.3rem;color:#fff;text-shadow:1px 2px 4px rgba(0,0,0,.2);flex:1}
  .content{padding:20px 16px 40px;max-width:680px;margin:0 auto}
  .section-title{font-family:'Pacifico',cursive;font-size:1rem;color:var(--accent);margin:20px 0 8px}
  .page-img{width:100%;border-radius:12px;margin:12px 0;box-shadow:0 2px 12px rgba(60,80,120,.12)}
  .info-card{background:#fff;border-left:4px solid var(--accent);border-radius:12px;padding:16px 18px;margin:0 0 18px;box-shadow:0 2px 10px rgba(60,80,120,.10)}
  .info-card p{font-size:.92rem;line-height:1.75;color:var(--text-mid);margin:0}
  .info-card p + p{margin-top:8px}
  .back-footer{text-align:center;margin-top:28px;padding-bottom:20px}
  .back-footer a{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#fff;text-decoration:none;padding:12px 28px;border-radius:999px;font-weight:800;font-size:.9rem;transition:opacity .2s}
  .back-footer a:hover{opacity:.8}
</style>
  <link rel="stylesheet" href="../assets/cute-pack.css">
</head>
<body>
<div class="lang-bar">
  <button class="lang-btn active" onclick="setLang('en',this)">&#x1F1EC;&#x1F1E7; EN</button>
  <button class="lang-btn" onclick="setLang('ja',this)">&#x1F1EF;&#x1F1F5; JA</button>
  <button class="lang-btn" onclick="setLang('zh',this)">&#x1F1E8;&#x1F1F3; ZH</button>
  <button class="lang-btn" onclick="setLang('ko',this)">&#x1F1F0;&#x1F1F7; KO</button>
  <button class="lang-btn" onclick="setLang('fr',this)">&#x1F1EB;&#x1F1F7; FR</button>
  <button class="lang-btn" onclick="setLang('es',this)">&#x1F1EA;&#x1F1F8; ES</button>
</div>
<div class="top-bar">
  <a href="../" class="back-btn">&#x2190;</a>
  <span class="top-emoji">🧺</span>
  <div class="top-title">Laundry</div>
</div>
<div class="content">
  <div class="section-title" data-i18n="s1"></div>
  <img src="../assets/guide/laundry-washer.png" class="page-img" alt="Washing machine guide">
  <div class="info-card"><p data-i18n="lw1"></p></div>

  <div class="section-title" data-i18n="s2"></div>
  <img src="../assets/guide/laundry-dryer.png" class="page-img" alt="Clothes dryer guide">
  <div class="info-card"><p data-i18n="lw2"></p><p data-i18n="lw3"></p></div>

  <div class="back-footer">
    <a href="../" data-i18n="backToMenu">&#x2190; Back to Menu</a>
  </div>
</div>
<script>
const S = {
  en: {
    backToMenu: "← Back to Menu",
    s1: "Washing Machine",
    s2: "Clothes Dryer",
    lw1: "Detergent goes in the back compartment and fabric softener goes in the front compartment. After selecting the course, press START/PAUSE.",
    lw2: "Turn the dryer on with POWER, then choose AUTO for the recommended setting.",
    lw3: "Press START to begin drying. After the cycle ends, remove the clothes once the machine unlocks."
  },
  ja: {
    backToMenu: "← メニューに戻る",
    s1: "洗濯機",
    s2: "衣類乾燥機",
    lw1: "洗剤は奥、柔軟剤は手前の投入口に入れてください。コースを選んだあと START/PAUSE を押します。",
    lw2: "POWER で電源を入れ、基本的には AUTO を選ぶのがおすすめです。",
    lw3: "START を押すと乾燥が始まります。終了後、ロック解除を確認してから洗濯物を取り出してください。"
  },
  zh: {
    backToMenu: "← 返回菜单",
    s1: "洗衣机",
    s2: "烘干机",
    lw1: "洗涤剂放后侧，柔顺剂放前侧。选择程序后按 START/PAUSE。",
    lw2: "按 POWER 开机，通常建议选择 AUTO 模式。",
    lw3: "按 START 开始烘干。程序结束并解锁后再取出衣物。"
  },
  ko: {
    backToMenu: "← 메뉴로 돌아가기",
    s1: "세탁기",
    s2: "의류 건조기",
    lw1: "세제는 안쪽, 섬유유연제는 앞쪽 투입구에 넣고 코스를 고른 뒤 START/PAUSE 를 누르세요.",
    lw2: "POWER 로 전원을 켠 뒤 기본적으로 AUTO 모드를 추천합니다.",
    lw3: "START 를 누르면 건조가 시작됩니다. 종료 후 잠금이 풀리면 옷을 꺼내세요."
  },
  fr: {
    backToMenu: "← Retour au menu",
    s1: "Lave-linge",
    s2: "Sèche-linge",
    lw1: "Mettez la lessive dans le compartiment du fond et l'assouplissant dans le compartiment avant. Après avoir choisi le programme, appuyez sur START/PAUSE.",
    lw2: "Allumez avec POWER puis choisissez AUTO, le mode recommandé.",
    lw3: "Appuyez sur START pour lancer le séchage. Retirez le linge après la fin du cycle et le déverrouillage."
  },
  es: {
    backToMenu: "← Volver al menú",
    s1: "Lavadora",
    s2: "Secadora",
    lw1: "Ponga el detergente en el compartimento trasero y el suavizante en el compartimento delantero. Después de elegir el programa, pulse START/PAUSE.",
    lw2: "Encienda con POWER y normalmente use AUTO, que es el ajuste recomendado.",
    lw3: "Pulse START para comenzar el secado. Saque la ropa cuando termine el ciclo y se desbloquee la máquina."
  }
};

function setLang(lang, btn) {
  document.querySelectorAll(".lang-btn").forEach((b) => b.classList.remove("active"));
  btn.classList.add("active");
  const dict = S[lang];
  if (!dict) return;
  document.querySelectorAll("[data-i18n]").forEach((el) => {
    const key = el.getAttribute("data-i18n");
    if (key in dict) el.textContent = dict[key];
  });
}

setLang("en", document.querySelector(".lang-btn.active"));
</script>
  <script src="../assets/cute-pack.js" defer></script>
</body>
</html>
